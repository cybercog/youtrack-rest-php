services:
  php81:
    container_name: php-youtrack-rest-81
    image: php-youtrack-rest
    build:
      context: ./
      dockerfile: ./.docker/php81.Dockerfile
    tty: true
    working_dir: /app
    volumes:
      - ./:/app

